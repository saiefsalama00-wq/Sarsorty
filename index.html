<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sarsorty ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            /* كود خلفية الصورة الشخصية */
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: black; /* لون احتياطي لو الصورة محملتش */
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        #login {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); /* تظليل غامق لشاشة الدخول */
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }

        input { padding: 12px; border-radius: 10px; border: none; width: 200px; text-align: center; font-size: 16px; }
        button { padding: 10px 30px; margin-top: 15px; background: #ff2e63; border: none; color: white; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; }
        
        .hidden { display: none !important; }

        .content { 
            padding: 20px; 
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.4); /* تظليل خفيف فوق الصورة عشان الكلام يبان */
            animation: fadeIn 2s; 
        }

        img.personal-photos { width: 90%; max-width: 300px; border-radius: 20px; margin: 15px 0; box-shadow: 0 0 15px rgba(255,46,99,0.5); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .heart { position: fixed; color: #ff2e63; animation: float 5s linear infinite; z-index: 50; font-size: 20px; pointer-events: none; }
        @keyframes float { 0% { transform: translateY(110vh); } 100% { transform: translateY(-10vh); } }

        .text { white-space: pre-line; font-size: 1.2rem; line-height: 1.6; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; margin: 20px; }
    </style>
</head>
<body>

    <div id="login">
        <h2>🔒 اكتبي الباسورد يا سرسورتي</h2>
        <input type="password" id="pass" placeholder="كلمة السر هنا...">
        <button onclick="check()">دخول</button>
    </div>

    <div id="main" class="hidden content">
        <h2 style="margin-top:40px;">💖 بحبك يا سرسورتي 💖</h2>
        <h3 id="days"></h3>
        
        <p class="text">
            كنت عاوز اقولك بس ان انا بحبكك اووي وبحبك أكثر من نفسي كمان وبدمنك حرفياا... ❤️
        </p>

        <img src="photo1.jpg.png" class="personal-photos">
        <img src="photo2.jpg.png" class="personal-photos">
        <img src="photo3.jpg.png" class="personal-photos">

        <div style="margin: 30px 0;">
            <iframe id="spotify-player" style="border-radius:12px" 
                src="https://open.spotify.com/embed/track/1yT9vLh1K3l07n2m1E8wYp?utm_source=generator" 
                width="100%" height="80" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
        </div>
    </div>

    <script>
        function check() {
            var p = document.getElementById("pass").value;
            if (p.toLowerCase().trim() === "love") {
                document.getElementById("login").classList.add("hidden");
                document.getElementById("main").classList.remove("hidden");
                
                // تشغيل الموسيقى
                var player = document.getElementById("spotify-player");
                player.src += "&autoplay=1";
                
                calculateDays();
                startHearts();
            } else {
                alert("الباسورد غلط يا روحي 😒");
            }
        }

        function calculateDays() {
            var start = new Date("2024-06-17");
            var now = new Date();
            var diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
            document.getElementById("days").innerHTML = "عدّى على حبنا " + diff + " يوم ❤️";
        }

        function startHearts() {
            for (var i = 0; i < 30; i++) {
                setTimeout(function() {
                    var h = document.createElement("div");
                    h.innerHTML = "❤️";
                    h.className = "heart";
                    h.style.left = Math.random() * 100 + "%";
                    h.style.animationDuration = (3 + Math.random() * 5) + "s";
                    document.body.appendChild(h);
                }, i * 300);
            }
        }
    </script>
</body>
</html>
